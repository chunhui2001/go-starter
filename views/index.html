{{define "head"}}
<title>Index Page...</title>
{{end}}

{{define "content"}}
    <h1>{{.content}}</h1>
{{end}}

{{define "scripts"}}
<script type="text/javascript">
    var ws;

    $(function() {
        connect();
    });

    function connect() {

        ws = new WebSocket('ws://localhost:8080/ws1');

        ws.onopen = e => {
            console.log('connected!')
        }

        ws.onmessage = e => {
            console.log(e.data)
        }

        ws.onerror = msg => {
            console.log('socket error:' + msg.toString());
        }
        
        ws.onclose = () => {
            console.log('socket closed');
            connect();
        }
    
    }

</script>
{{end}}
