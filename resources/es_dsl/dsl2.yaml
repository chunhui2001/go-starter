
LAST_SNAPSHOT_DATE: >
  {
    "_source": [
      "createDate"
    ],
    "size": 1,
    "sort": [
      {
        "createDate": {
          "order": "desc"
        }
      }
    ]
  }

DISTINCT_QUERY: >
  {
    "_source": [
      "createDate"
    ],
    "size": {{.size}},
    "query": {
      "bool": {
        "must": [
          {
            "term": {
              "createDate": {{.createDate}}
            }
          }
        ]
      }
    },
    "collapse": {
      "field": "{{.fieldName}}"
    }
  }

COUNT_OF_DISTINCT_GROUP_BY: >
  {
    "size": 0,
    "query": {
      "bool": {
        "must": [
          {
            "term": {
              "createDate": {{.createDate}}
            }
          }
        ]
      }
    },
    "aggs": {
      "group_by_{{.groupByFieldName}}": {
        "terms": {
          "field": "{{.groupByFieldName}}",
          "size": 10000
        },
        "aggs": {
          "do_a_count_on_field_{{.aggsFieldName}}": {
            "cardinality": {
              "field": "{{.aggsFieldName}}"
            }
          }
        }
      }
    }
  }

SUM_OF_GROUP_BY: >
  {
    "size": 0,
    "query": {
      "bool": {
        "must": [
          {
            "term": {
              "createDate": {{.createDate}}
            }
          }
        ]
      }
    },
    "aggs": {
      "group_by_{{.groupByFieldName}}": {
        "terms": {
          "field": "{{.groupByFieldName}}",
          "size": 10000
        },
        "aggs": {
          "do_a_sum_on_field_{{.aggsFieldName}}": {
            "sum": {
              "field": "{{.aggsFieldName}}"
            }
          }
        }
      }
    }
  }

QUERY_DATA_BY_DATE: >
  {
    "size": {{.size}},
    "query": {
      "bool": {
        "must": [
          {
            "term": {
              "createDate": {{.createDate}}
            }
          }
        ],
        "filter": [
          {
            "exists": {
              "field": "_id"
            }
          }
          {{- if .bdUserId}}
          , {
            "terms": {
              "bdUserId": [{{ join "," .bdUsers }}]
            }
          }
          {{- end}}
          {{- if .labels}}
          , {
            "terms": {
              "identityLabel1Name": ["{{ join "\",\"" .labels }}"]
            }
          }
          {{- end}}
          {{- if .flags}}
          , {
            "terms": {
              "newRegFlag": [{{ join "," .flags }}]
            }
          }
          {{- end}}
        ]
      }
    },
    "sort": [
      {
        "createDate": {
          "order": "desc"
        }
      }
    ]
  }

